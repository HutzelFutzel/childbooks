name: Deploy backend

# Continuous delivery for the parts of the stack that DON'T deploy via Firebase
# App Hosting's GitHub integration:
#   - the `api` Cloud Function (+ scheduled/trigger functions)
#   - Firestore rules + indexes
#   - Storage rules
#
# The Next.js frontend is deployed by App Hosting automatically (connect the
# repo + branch in the Firebase console); it is intentionally NOT handled here.
#
# Secrets (OpenAI/Gemini/Lulu/Stripe keys) are NOT set by this workflow — set
# them once with `firebase functions:secrets:set <NAME>`. The function only
# references them (see functions/src/secrets.ts → ALL_SECRETS); a deploy binds
# the latest secret versions.
#
# ── Required repo configuration ────────────────────────────────────────────
#   Secrets:
#     GCP_WIF_PROVIDER  — Workload Identity Federation provider resource name
#     GCP_DEPLOY_SA     — deploy service account email
#   The SA needs roughly: Cloud Functions Admin, Cloud Run Admin, Service
#   Account User, Firebase Rules Admin, Cloud Datastore Index Admin, and
#   Secret Manager Secret Accessor (to bind the function secrets).
#
#   Prefer WIF over a long-lived key. If you must use a JSON key instead, store
#   it as a secret and swap the auth step's inputs for `credentials_json`.

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "books-frontend/src/core/**" # shared modules the backend bundles
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {} # allow manual runs

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build functions
        run: yarn build:functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Deploy functions, rules & indexes
        run: >-
          yarn firebase deploy
          --only functions,firestore:rules,firestore:indexes,storage
          --project childbook-60f89
          --non-interactive
